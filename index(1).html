<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Happy Birthday Anin</title>
<link href='https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500;700&display=swap' rel='stylesheet'>
<script src='https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js'></script>
<style>
body{margin:0;font-family:Poppins,sans-serif;background:linear-gradient(-45deg,#3b1d5a,#5b3cc4,#7f5af0,#2cb67d);background-size:400% 400%;animation:bg 12s infinite;color:#fff;overflow:hidden}
@keyframes bg{0%,100%{background-position:0 50%}50%{background-position:100% 50%}}
.wrap{height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{max-width:700px;background:rgba(255,255,255,.12);backdrop-filter:blur(18px);padding:30px;border-radius:24px;text-align:center}
h1{font-family:Great Vibes,cursive;font-size:68px;margin:0}
#msg{white-space:pre-wrap;text-align:left;min-height:260px}
button{padding:12px 24px;border:none;border-radius:30px;background:#fff;color:#5b3cc4;font-weight:bold;cursor:pointer}
.star{position:fixed;top:-20px;animation:fall linear forwards}.c{display:inline-block;width:8px;background:#fff;animation:b .8s infinite}@keyframes b{50%{opacity:0}}@keyframes fall{to{transform:translateY(110vh)}}
</style></head><body><div class='wrap'><div class='card'><h1>Happy Birthday</h1><h2>Anin 💜</h2><p>In a world full of people, my favorite place is beside you.</p><button onclick='start()'>Open Your Surprise ✨</button><div id='msg'></div></div></div>
<audio id='m' loop><source src='music.mp3'></audio>
<script>
setInterval(()=>{let s=document.createElement('div');s.className='star';s.textContent=['✨','💜','⭐'][Math.floor(Math.random()*3)];s.style.left=Math.random()*100+'vw';s.style.animationDuration=(4+Math.random()*4)+'s';document.body.appendChild(s);setTimeout(()=>s.remove(),8000)},300);
const t=`Dear Anin ❤️,

Happy Birthday, my love.

Today is all about celebrating you—the most beautiful part of my life. Thank you for filling my days with happiness, love, and countless smiles.

I hope this year brings you endless joy, success, and every dream you've been wishing for.

Never forget how special you are to me.

Happy Birthday, my beautiful Anin. ❤️

Forever Yours,

Coffee ❤️`;
function start(){m.play().catch(()=>{});document.querySelector('button').remove();let i=0,d=msg,c=document.createElement('span');c.className='c';(function w(){if(i<t.length){d.textContent+=t[i++];d.appendChild(c);setTimeout(w,32)}else{c.remove();confetti({particleCount:220,spread:180});}})();}
</script></body></html>
